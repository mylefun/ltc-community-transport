<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>社區交通車每日接送系統</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="主選單">
        <div class="sidebar-head">
          <div class="brand">
            <span class="brand-mark" aria-hidden="true">交</span>
            <div class="brand-text">
              <p class="eyebrow">長照社區交通</p>
              <h1>每日接送系統</h1>
            </div>
          </div>
          <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="收合側邊選單">‹</button>
        </div>

        <nav class="nav-list">
          <button class="nav-item active" data-view="dashboard" aria-label="承辦人工作台">
            <span aria-hidden="true">▦</span>
            <b>承辦人工作台</b>
          </button>
          <button class="nav-item" data-view="cases" aria-label="個案資料">
            <span aria-hidden="true">◎</span>
            <b>個案資料</b>
          </button>
          <button class="nav-item" data-view="drivers" aria-label="司機管理">
            <span aria-hidden="true">◫</span>
            <b>司機管理</b>
          </button>
          <button class="nav-item" data-view="driver" aria-label="司機入口">
            <span aria-hidden="true">▣</span>
            <b>司機入口</b>
          </button>
          <button class="nav-item" data-view="settings" aria-label="系統設定">
            <span aria-hidden="true">◇</span>
            <b>系統設定</b>
          </button>
        </nav>

        <section class="today-panel" aria-label="今日摘要">
          <p class="muted-label">服務日期</p>
          <strong id="todayLabel"></strong>
          <div class="connection-state">
            <span class="dot local"></span>
            <span>本機示範資料</span>
          </div>
        </section>
      </aside>

      <main class="main-area">
        <header class="topbar">
          <div>
            <p class="eyebrow">承辦人視角</p>
            <h2 id="viewTitle">承辦人工作台</h2>
          </div>
          <div class="top-actions">
            <div class="clock" id="clock">--:--</div>
            <button class="ghost-btn" id="resetDemoBtn" type="button">重置示範資料</button>
          </div>
        </header>

        <section id="appView" class="view-host" aria-live="polite"></section>
      </main>
    </div>

    <template id="dashboardTemplate">
      <section class="ops-hero">
        <div>
          <p class="eyebrow">今日調度總覽</p>
          <h3>司機位置、接送進度與異常班次集中掌握</h3>
        </div>
        <div class="hero-metrics">
          <span>即時狀態</span>
          <strong id="heroStatusText">載入中</strong>
        </div>
      </section>

      <div class="summary-grid" id="summaryGrid"></div>

      <section class="dashboard-grid">
        <div class="work-section map-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">司機即時位置</p>
              <h3>接送定位地圖</h3>
            </div>
            <span class="count-pill" id="mapDriverCount"></span>
          </div>
          <div class="live-map" id="liveMap" aria-label="司機定位地圖"></div>
        </div>
      </section>

      <section class="work-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">即時接送狀態</p>
            <h3>今日班表</h3>
          </div>
          <div class="filter-row">
            <label>
              司機
              <select id="driverFilter"></select>
            </label>
            <label>
              狀態
              <select id="statusFilter">
                <option value="all">全部</option>
                <option value="scheduled">待接</option>
                <option value="picked_up">接送中</option>
                <option value="completed">已完成</option>
                <option value="late">可能延遲</option>
              </select>
            </label>
          </div>
        </div>
        <div class="route-board" id="routeBoard"></div>
      </section>
    </template>

    <template id="casesTemplate">
      <div class="case-workspace" id="caseWorkspace">
        <section class="work-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">管理個案資料</p>
              <h3>個案名冊</h3>
            </div>
            <div class="heading-actions">
              <span class="count-pill" id="caseCount"></span>
              <button class="icon-add-btn" id="openCaseFormBtn" type="button" aria-label="新增個案">+</button>
            </div>
          </div>
          <div class="case-list" id="caseList"></div>
        </section>

        <section class="work-section compact-section case-form-panel" id="caseFormPanel" hidden>
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="caseFormMode">新增個案</p>
              <h3>個案資料</h3>
            </div>
          </div>
          <form class="case-form" id="caseForm">
            <input type="hidden" name="id" />
            <label>
              個案姓名
              <input required name="name" autocomplete="name" />
            </label>
            <label>
              個案編號
              <input required name="caseNo" placeholder="LTC-006" />
            </label>
            <label>
              聯絡電話
              <input required name="phone" inputmode="tel" />
            </label>
            <label>
              緊急聯絡人
              <input name="emergencyContact" />
            </label>
            <label>
              緊急電話
              <input name="emergencyPhone" inputmode="tel" />
            </label>
            <label>
              照顧等級
              <select name="careLevel">
                <option>長照2.0 2級</option>
                <option>長照2.0 3級</option>
                <option selected>長照2.0 4級</option>
                <option>長照2.0 5級</option>
                <option>長照2.0 6級以上</option>
              </select>
            </label>
            <label>
              行動狀態
              <select name="mobility">
                <option>可自行上下車</option>
                <option>需攙扶</option>
                <option>輪椅</option>
                <option>臥床移位</option>
              </select>
            </label>
            <label class="full">
              上車地址
              <input required name="pickupAddress" />
            </label>
            <label class="full">
              目的地
              <input required name="destinationAddress" />
            </label>
            <label class="full">
              備註
              <textarea name="note" rows="3"></textarea>
            </label>
            <div class="inline-fields full">
              <label>
                今日上車
                <input name="scheduledPickup" type="time" value="09:00" />
              </label>
              <label>
                今日送達
                <input name="scheduledDropoff" type="time" value="09:30" />
              </label>
              <label>
                指派司機
                <select name="driverId" id="caseDriverSelect"></select>
              </label>
            </div>
            <label class="check-row full">
              <input name="createTrip" type="checkbox" checked />
              <span>同步加入今日接送班表</span>
            </label>
            <div class="form-actions full">
              <button class="primary-btn" type="submit" id="caseSubmitBtn">新增個案</button>
              <button class="ghost-btn" type="button" id="caseCancelBtn">清除</button>
            </div>
          </form>
        </section>
      </div>
    </template>

    <template id="driversTemplate">
      <div class="split-layout">
        <section class="work-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow">管理司機資料</p>
              <h3>司機名冊</h3>
            </div>
            <span class="count-pill" id="driverCount"></span>
          </div>
          <div class="case-list" id="driverList"></div>
        </section>

        <section class="work-section compact-section">
          <div class="section-heading">
            <div>
              <p class="eyebrow" id="driverFormMode">新增司機</p>
              <h3>司機資料</h3>
            </div>
          </div>
          <form class="case-form" id="driverForm">
            <input type="hidden" name="id" />
            <label>
              司機姓名
              <input required name="name" />
            </label>
            <label>
              聯絡電話
              <input required name="phone" inputmode="tel" />
            </label>
            <label>
              車號
              <input required name="vehicleNo" placeholder="KAA-1032" />
            </label>
            <label>
              路線
              <input required name="routeLabel" placeholder="A 線" />
            </label>
            <label>
              快速登入 PIN
              <input required name="pin" inputmode="numeric" maxlength="8" />
            </label>
            <label>
              狀態
              <select name="active">
                <option value="true">服務中</option>
                <option value="false">停用</option>
              </select>
            </label>
            <div class="form-actions full">
              <button class="primary-btn" type="submit" id="driverSubmitBtn">新增司機</button>
              <button class="ghost-btn" type="button" id="driverCancelBtn">清除</button>
            </div>
          </form>
        </section>
      </div>
    </template>

    <template id="driverTemplate">
      <section class="driver-view" id="driverView"></section>
    </template>

    <template id="settingsTemplate">
      <section class="work-section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">系統版本</p>
            <h3>更新紀錄</h3>
          </div>
        </div>
        <div class="release-list" id="releaseList"></div>
      </section>
    </template>

    <script src="./app.js" defer></script>
  </body>
</html>
